apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.postgresql
  version: v2
  metadata:
  - name: connectionString
    value: "host=postgres-db user=postgres password=test_password port=5432 database=actor_state sslmode=disable"
  - name: actorStateStore
    value: "true"
  - name: tablePrefix
    value: "pushpop_"
